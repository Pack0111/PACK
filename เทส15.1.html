<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transportation Booking and Analysis System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Transportation Booking and Analysis System</h1>
    </header>
    <main>
        <section>
            <h2>Book a Ride</h2>
            <form action="submit_booking.php" method="POST">
                <label for="pickup">Pickup Location:</label>
                <input type="text" id="pickup" name="pickup" required>
                <label for="dropoff">Dropoff Location:</label>
                <input type="text" id="dropoff" name="dropoff" required>
                <label for="date">Date:</label>
                <input type="date" id="date" name="date" required>
                <label for="time">Time:</label>
                <input type="time" id="time" name="time" required>
                <button type="submit">Book Now</button>
            </form>
        </section>
        <section>
            <h2>Analysis</h2>
            <p>Analyze ride data and trends here.</p>
        </section>
    </main>
    <footer>
        <p>&copy; 2026 Transportation Booking and Analysis System</p>
    </footer>
</body>
</html>
